<svg width="1400" height="980" viewBox="0 0 1400 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="92" y1="56" x2="1310" y2="922" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#13203B"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1400" height="980" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020817" flood-opacity="0.28"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="50" y="42" width="1300" height="896" rx="30" fill="url(#bg)"/>
    <rect x="50.5" y="42.5" width="1299" height="895" rx="29.5" stroke="#35507D" stroke-opacity="0.5"/>
  </g>

  <text x="92" y="120" fill="#F8FBFF" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800">The AI Chip Stack</text>
  <text x="92" y="158" fill="#C5D2F4" font-family="Inter, Arial, sans-serif" font-size="22">Eight layers that turn a model into a physical system that can run reliably and fast.</text>

  <text x="112" y="232" fill="#8FB3FF" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0.08em">LAYER</text>
  <text x="232" y="232" fill="#8FB3FF" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0.08em">WHAT IT DOES</text>
  <text x="1068" y="232" fill="#8FB3FF" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0.08em">COMMON TOOLS</text>

  <rect x="92" y="258" width="1216" height="78" rx="20" fill="#2E90FA"/>
  <circle cx="136" cy="297" r="24" fill="#0F172A"/>
  <text x="136" y="304" text-anchor="middle" fill="#F8FBFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">L1</text>
  <text x="182" y="292" fill="#F8FBFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">AI App and Framework</text>
  <text x="182" y="317" fill="#EAF2FF" font-family="Inter, Arial, sans-serif" font-size="17">Where the model, application logic, and serving interface live.</text>
  <text x="1068" y="304" fill="#F8FBFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">PyTorch  ONNX  TensorRT  MLOps</text>

  <rect x="92" y="352" width="1216" height="78" rx="20" fill="#3B82F6"/>
  <circle cx="136" cy="391" r="24" fill="#0F172A"/>
  <text x="136" y="398" text-anchor="middle" fill="#F8FBFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">L2</text>
  <text x="182" y="386" fill="#F8FBFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">ML Compiler</text>
  <text x="182" y="411" fill="#EAF2FF" font-family="Inter, Arial, sans-serif" font-size="17">Lowers graphs into optimized kernels, schedules, and target-specific code.</text>
  <text x="1068" y="398" fill="#F8FBFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">MLIR  TVM  LLVM  Triton</text>

  <rect x="92" y="446" width="1216" height="78" rx="20" fill="#2563EB"/>
  <circle cx="136" cy="485" r="24" fill="#0F172A"/>
  <text x="136" y="492" text-anchor="middle" fill="#F8FBFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">L3</text>
  <text x="182" y="480" fill="#F8FBFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Runtime and Driver</text>
  <text x="182" y="505" fill="#EAF2FF" font-family="Inter, Arial, sans-serif" font-size="17">Connects software requests to GPU, accelerator, memory, and device execution.</text>
  <text x="1068" y="492" fill="#F8FBFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">CUDA runtime  kernel APIs  drivers</text>

  <rect x="92" y="540" width="1216" height="78" rx="20" fill="#16A34A"/>
  <circle cx="136" cy="579" r="24" fill="#0F172A"/>
  <text x="136" y="586" text-anchor="middle" fill="#F8FBFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">L4</text>
  <text x="182" y="574" fill="#F8FBFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Firmware and OS</text>
  <text x="182" y="599" fill="#EAF2FF" font-family="Inter, Arial, sans-serif" font-size="17">Boots the device, manages resources, and exposes the deployment platform.</text>
  <text x="1068" y="586" fill="#F8FBFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">FreeRTOS  BSP  bootloaders  Linux</text>

  <rect x="92" y="634" width="1216" height="78" rx="20" fill="#059669"/>
  <circle cx="136" cy="673" r="24" fill="#0F172A"/>
  <text x="136" y="680" text-anchor="middle" fill="#F8FBFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">L5</text>
  <text x="182" y="668" fill="#F8FBFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Hardware Architecture</text>
  <text x="182" y="693" fill="#EAF2FF" font-family="Inter, Arial, sans-serif" font-size="17">Defines dataflow, memory hierarchy, on-chip network, and compute organization.</text>
  <text x="1068" y="680" fill="#F8FBFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">systolic arrays  HBM  NoC</text>

  <rect x="92" y="728" width="1216" height="78" rx="20" fill="#CA8A04"/>
  <circle cx="136" cy="767" r="24" fill="#111827"/>
  <text x="136" y="774" text-anchor="middle" fill="#FFF7ED" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">L6</text>
  <text x="182" y="762" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">RTL and Logic Design</text>
  <text x="182" y="787" fill="#1F2937" font-family="Inter, Arial, sans-serif" font-size="17">Implements the architecture in synthesizable hardware descriptions and verification logic.</text>
  <text x="1068" y="774" fill="#1F2937" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">SystemVerilog  FPGA  verification</text>

  <rect x="92" y="822" width="597" height="78" rx="20" fill="#F97316"/>
  <circle cx="136" cy="861" r="24" fill="#111827"/>
  <text x="136" y="868" text-anchor="middle" fill="#FFF7ED" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">L7</text>
  <text x="182" y="856" fill="#FFF7ED" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Physical Implementation</text>
  <text x="182" y="881" fill="#FFF1E8" font-family="Inter, Arial, sans-serif" font-size="17">Turns logic into floorplans, timing-closed layouts, and manufacturable geometry.</text>

  <rect x="711" y="822" width="597" height="78" rx="20" fill="#EF4444"/>
  <circle cx="755" cy="861" r="24" fill="#111827"/>
  <text x="755" y="868" text-anchor="middle" fill="#FFF5F5" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">L8</text>
  <text x="801" y="856" fill="#FFF5F5" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Fabrication and Packaging</text>
  <text x="801" y="881" fill="#FFF1F2" font-family="Inter, Arial, sans-serif" font-size="17">Moves the design into foundry process, packaging, assembly, yield, and test.</text>
</svg>
